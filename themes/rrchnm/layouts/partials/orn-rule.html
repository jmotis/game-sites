{{/* Usage: {{ partial "orn-rule.html" (dict "label" "In Development" "site" .Site) }} */}}
<h2 class="orn-rule">
  <span class="orn-rule__line" aria-hidden="true"></span>
  <svg width="36" height="14" viewBox="0 0 36 14" aria-hidden="true" focusable="false">
    <circle cx="18" cy="7" r="3"   fill="{{ .site.Params.primary }}" />
    <circle cx="6"  cy="7" r="1.5" fill="{{ .site.Params.primary }}" />
    <circle cx="30" cy="7" r="1.5" fill="{{ .site.Params.primary }}" />
  </svg>
  <span class="orn-rule__label">{{ .label }}</span>
  <svg width="36" height="14" viewBox="0 0 36 14" aria-hidden="true" focusable="false">
    <circle cx="18" cy="7" r="3"   fill="{{ .site.Params.primary }}" />
    <circle cx="6"  cy="7" r="1.5" fill="{{ .site.Params.primary }}" />
    <circle cx="30" cy="7" r="1.5" fill="{{ .site.Params.primary }}" />
  </svg>
  <span class="orn-rule__line" aria-hidden="true"></span>
</h2>
