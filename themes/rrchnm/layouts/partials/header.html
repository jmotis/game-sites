<header class="site-header">
  <div class="site-header__inner">
    <a href="{{ .Site.Home.RelPermalink }}" class="brand" aria-label="{{ .Site.Params.siteName }} — home">
      {{- partial "rrchnm-mark.html" . -}}
      <div class="brand__text">
        <span class="brand__name">{{ .Site.Params.siteName }}</span>
        <span class="brand__tagline">{{ .Site.Params.tagline }}</span>
      </div>
    </a>
    <nav class="site-nav" aria-label="Main navigation">
      {{- $currentPage := . -}}
      {{- range .Site.Menus.main -}}
        {{- $url := .URL | relURL -}}
        {{- $isActive := eq $url $currentPage.RelPermalink -}}
        <a href="{{ $url }}"
           class="site-nav__link{{ if $isActive }} site-nav__link--active{{ end }}"
           {{ if $isActive }}aria-current="page"{{ end }}>
          {{- .Name -}}
        </a>
      {{- end }}
    </nav>
  </div>
</header>
