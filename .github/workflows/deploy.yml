name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for GitHub Pages deploy
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight deploy at a time
concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.140.2"
    steps:
      - name: Install Hugo (extended)
        run: |
          wget -O "${RUNNER_TEMP}/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${RUNNER_TEMP}/hugo.deb"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build games-hub → public/hub/
        env:
          HUGO_ENVIRONMENT: production
        run: |
          hugo --gc --minify \
            --source games-hub \
            --destination "${GITHUB_WORKSPACE}/public/hub" \
            --baseURL "${{ steps.pages.outputs.base_url }}/hub/"

      - name: Build plague-site → public/plague/
        env:
          HUGO_ENVIRONMENT: production
        run: |
          hugo --gc --minify \
            --source plague-site \
            --destination "${GITHUB_WORKSPACE}/public/plague" \
            --baseURL "${{ steps.pages.outputs.base_url }}/plague/"

      - name: Build shipping-site → public/shipping/
        env:
          HUGO_ENVIRONMENT: production
        run: |
          hugo --gc --minify \
            --source shipping-site \
            --destination "${GITHUB_WORKSPACE}/public/shipping" \
            --baseURL "${{ steps.pages.outputs.base_url }}/shipping/"

      - name: Add landing page → public/index.html
        run: cp landing/index.html public/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
