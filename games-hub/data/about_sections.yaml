- label: "Project Team"
  body:  "Stephanie Grimm · Alexandra Miller · Jessica Otis · Nathan Sleeter · Tony Trinh"

- label: "RRCHNM"
  body: >
    The Roy Rosenzweig Center for History and New Media was founded in 1994 with
    a mission to democratize access to history. Its projects include the
    <em>Who Built America?</em> CD-ROM series of the 1990s,
    <a href="https://teachinghistory.org">TeachingHistory.org</a>,
    <a href="https://worldhistorycommons.org">World History Commons</a>, and more.

- label: "GMU"
  body: >
    George Mason University is a public R-1 university located in the
    Commonwealth of Virginia. RRCHNM is on the Fairfax campus.
