- label: "Roy Rosenzweig Center for History and New Media"
  body: >
    RRCHNM was founded in 1994
    with a mission to democratize access to history. From the beginning, K-12
    education has been a particular focus of the center which as developed a
    wide variety of free, high-quality educational resources backed by
    historical scholarship. These resources, which include
    <em>Who Built America?</em> CD-ROM series of the 1990s,
    <a href="https://teachinghistory.org">TeachingHistory.org</a>,
    <a href="https://worldhistorycommons.org">World History Commons</a>,
    and more, not only feature historical content but also model how
    historians approach evidence and think about the past.

- label: "George Mason University"
  body: >
    GMU is a public R-1 university located in the
    Commonwealth of Virginia. Its primary campus, where RRCHNM is located,
    is in Fairfax, Virginia.
