{{ define "main" }}
{{- $sections := .Site.Data.about_sections -}}

<div class="page-body">
  <div class="about-inner">
    <h1 class="page-title">{{ .Title }}</h1>
    <p class="page-intro">{{ .Content | plainify }}</p>

    {{- range $sections }}
    <div class="about-section">
      <p class="about-section__label">{{ .label }}</p>
      <div class="about-section__body">{{ .body | safeHTML }}</div>
    </div>
    {{- end }}
  </div>
</div>
{{ end }}
