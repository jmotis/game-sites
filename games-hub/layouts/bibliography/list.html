{{ define "main" }}
{{- $sections := .Site.Data.bibliography -}}

<div class="page-body">
  <div class="bib-inner">
    <h1 class="page-title">{{ .Title }}</h1>

    {{- range $sections }}
    <section class="about-section">
      <h2 class="about-section__label">{{ .label }}</h2>
      <ul class="bib-list">
        {{- range .entries }}
        <li class="bib-entry">
          <p class="bib-entry__text">
            {{ .text | safeHTML }}
            {{- with .url }}
            <a class="bib-entry__url" href="{{ . }}" rel="noopener noreferrer" target="_blank">{{ . }}</a>
            {{- end }}
          </p>
        </li>
        {{- end }}
      </ul>
    </section>
    {{- end }}
  </div>
</div>
{{ end }}
