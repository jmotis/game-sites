{{ define "main" }}
{{- $entries := .Site.Data.bibliography -}}

<div class="page-body">
  <div class="bib-inner">
    <h1 class="page-title">{{ .Title }}</h1>

    <ul class="bib-list" aria-label="Bibliography">
      {{- range $entries }}
      <li class="bib-entry">
        <p class="bib-entry__text">
          {{ .text | safeHTML }}
          {{- with .url }}
          <a class="bib-entry__url" href="{{ . }}" rel="noopener noreferrer" target="_blank">{{ . }}</a>
          {{- end }}
        </p>
      </li>
      {{- end }}
    </ul>
  </div>
</div>
{{ end }}
